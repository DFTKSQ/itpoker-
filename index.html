<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITPoker — Покерный калькулятор</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green: #1a4731;
    --green-mid: #1e5c3a;
    --green-light: #2a7a4f;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --cream: #f5edd8;
    --red: #c0392b;
    --red-chip: #d44;
    --blue-chip: #3a6bc9;
    --bg: #0f2c1a;
    --card-bg: #102a1c;
    --border: rgba(201,168,76,0.3);
    --text: #f5edd8;
    --text-muted: rgba(245,237,216,0.6);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SPLASH */
  #splash {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.8s ease;
    perspective: 600px;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  .coin-scene {
    position: relative;
    width: 140px; height: 180px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
  }

  .coin-wrapper {
    position: absolute;
    bottom: 24px;
    animation: coinToss 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    transform-style: preserve-3d;
  }

  @keyframes coinToss {
    0%   { transform: translateY(0px) rotateX(0deg); opacity: 1; }
    15%  { transform: translateY(-300px) rotateX(540deg); }
    35%  { transform: translateY(-420px) rotateX(1080deg); }
    55%  { transform: translateY(-200px) rotateX(1440deg); }
    68%  { transform: translateY(0px) rotateX(1800deg); }
    75%  { transform: translateY(-55px) rotateX(1890deg); }
    83%  { transform: translateY(0px) rotateX(1980deg); }
    89%  { transform: translateY(-18px) rotateX(2025deg); }
    94%  { transform: translateY(0px) rotateX(2070deg); }
    97%  { transform: translateY(-5px) rotateX(2090deg); }
    100% { transform: translateY(0px) rotateX(2160deg); }
  }

  .chip-svg { width: 130px; height: 130px; }

  .coin-shadow {
    width: 90px; height: 16px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowAnim 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    position: absolute;
    bottom: 0;
  }

  @keyframes shadowAnim {
    0%   { transform: scaleX(1); opacity: 0.6; }
    15%  { transform: scaleX(0.3); opacity: 0.15; }
    30%  { transform: scaleX(0.15); opacity: 0.08; }
    50%  { transform: scaleX(0.25); opacity: 0.12; }
    65%  { transform: scaleX(1); opacity: 0.55; }
    72%  { transform: scaleX(0.6); opacity: 0.3; }
    80%  { transform: scaleX(1); opacity: 0.55; }
    87%  { transform: scaleX(0.75); opacity: 0.35; }
    93%  { transform: scaleX(1); opacity: 0.55; }
    97%  { transform: scaleX(0.85); opacity: 0.4; }
    100% { transform: scaleX(1); opacity: 0.5; }
  }

  .splash-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    color: var(--gold);
    margin-top: 24px;
    letter-spacing: 2px;
    animation: fadeUp 0.6s 1.6s both;
  }
  .splash-sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 6px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeUp 0.6s 1.85s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Плавное появление меню */
  #app {
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  #app.visible { opacity: 1; }

  /* MAIN */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: linear-gradient(180deg, #0a1e11 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-chip { width: 36px; height: 36px; }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  main { flex: 1; padding: 20px; max-width: 640px; margin: 0 auto; width: 100%; }

  /* SECTION CARDS */
  .section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--gold);
    border-radius: 2px;
  }

  /* INPUTS */
  .input-row {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 10px;
  }
  label { font-size: 13px; color: var(--text-muted); min-width: 120px; }

  input[type="text"],
  input[type="number"] {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    padding: 9px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus,
  input[type="number"]:focus {
    border-color: var(--gold);
  }
  input::placeholder { color: rgba(245,237,216,0.3); font-size: 13px; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  .num-wrap { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
  .num-wrap:focus-within { border-color: var(--gold); }
  .num-wrap input { background: transparent; border: none; border-radius: 0; flex: 1; min-width: 0; }
  .num-btn { background: transparent; border: none; border-left: 1px solid rgba(201,168,76,0.2); color: var(--gold); font-size: 18px; line-height: 1; padding: 0 11px; cursor: pointer; height: 100%; display: flex; align-items: center; justify-content: center; transition: background 0.15s; user-select: none; }
  .num-btn:first-child { border-left: none; border-right: 1px solid rgba(201,168,76,0.2); }
  .num-btn:hover { background: rgba(201,168,76,0.12); }
  .num-btn:active { background: rgba(201,168,76,0.22); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-gold {
    background: var(--gold);
    color: #1a1a0d;
    font-weight: 600;
  }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger {
    background: transparent;
    border: 1px solid rgba(192,57,43,0.4);
    color: #e07060;
    font-size: 12px;
    padding: 6px 10px;
  }
  .btn-danger:hover { background: rgba(192,57,43,0.15); }
  .btn-big {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    justify-content: center;
  }

  /* PLAYERS */
  .player-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .player-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .player-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--green-mid);
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .player-name-inputs {
    display: flex; gap: 8px; flex: 1;
  }
  .player-extras {
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap;
  }
  .chip-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(42,122,79,0.2);
    border: 1px solid rgba(42,122,79,0.4);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: #6ecf96;
  }
  .add-rebuy {
    display: flex; gap: 6px; align-items: center;
    margin-top: 8px;
  }
  .add-rebuy input { max-width: 100px; }
  .rebuy-list {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* SETTINGS ROW */
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; color: var(--text-muted); }

  /* RESULTS */
  #results { display: none; }
  #results.show { display: block; }

  .result-debt {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.12);
    font-size: 14px;
  }
  .arrow-icon { color: var(--text-muted); font-size: 16px; }
  .amount-badge {
    margin-left: auto;
    background: rgba(42,122,79,0.2);
    border: 1px solid rgba(42,122,79,0.4);
    color: #6ecf96;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
  }
  .winner-row {
    background: rgba(201,168,76,0.07);
    border-color: rgba(201,168,76,0.25);
  }
  .no-debts {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .summary-card .val {
    font-size: 20px; font-weight: 600;
    color: var(--gold);
  }
  .summary-card .lbl {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .player-balance-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    font-size: 14px;
  }
  .bal-positive { color: #6ecf96; font-weight: 600; }
  .bal-negative { color: #e07060; font-weight: 600; }
  .bal-zero { color: var(--text-muted); }

  .output-text {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
    white-space: pre-wrap;
    font-family: 'Inter', monospace;
    max-height: 260px;
    overflow-y: auto;
  }

  .action-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 12px;
  }

  /* FELT PATTERN */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 8px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 8px);
    pointer-events: none;
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--green-mid);
    border: 1px solid var(--gold);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 888;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* MOBILE */
  @media (max-width: 480px) {
    main { padding: 14px; }
    .settings-grid { grid-template-columns: 1fr; }
    .player-name-inputs { flex-direction: column; gap: 6px; }
    .splash-title { font-size: 34px; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="coin-scene">
    <div class="coin-wrapper">
      <svg class="chip-svg" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
        <!-- основа фишки -->
        <circle cx="65" cy="65" r="60" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
        <!-- внутренний круг -->
        <circle cx="65" cy="65" r="46" fill="#a93226" stroke="#922b21" stroke-width="1.5"/>
        <!-- ободок декоративный -->
        <circle cx="65" cy="65" r="53" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
        <!-- чёрные сегменты по краю -->
        <g stroke="#1a1a1a" stroke-width="7" stroke-linecap="butt">
          <line x1="65" y1="5"   x2="65" y2="22"/>
          <line x1="65" y1="108" x2="65" y2="125"/>
          <line x1="5"  y1="65"  x2="22" y2="65"/>
          <line x1="108" y1="65" x2="125" y2="65"/>
          <line x1="17"  y1="24" x2="29"  y2="37"/>
          <line x1="101" y1="93" x2="113" y2="106"/>
          <line x1="113" y1="24" x2="101" y2="37"/>
          <line x1="29"  y1="93" x2="17"  y2="106"/>
        </g>
        <!-- белая окантовка сегментов -->
        <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
          <line x1="65" y1="5"   x2="65" y2="22"/>
          <line x1="65" y1="108" x2="65" y2="125"/>
          <line x1="5"  y1="65"  x2="22" y2="65"/>
          <line x1="108" y1="65" x2="125" y2="65"/>
        </g>
        <!-- текст ITP курсивом -->
        <text x="65" y="74" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-style="italic" font-size="26" fill="#f5edd8" letter-spacing="1">itp</text>
      </svg>
    </div>
    <div class="coin-shadow"></div>
  </div>
  <div class="splash-title">ITPoker</div>
  <div class="splash-sub">Покерный калькулятор</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <svg class="logo-chip" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="16" fill="#c0392b" stroke="#8b2317" stroke-width="1.5"/>
      <circle cx="18" cy="18" r="12" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <g stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9">
        <line x1="18" y1="2" x2="18" y2="6"/>
        <line x1="18" y1="30" x2="18" y2="34"/>
        <line x1="2" y1="18" x2="6" y2="18"/>
        <line x1="30" y1="18" x2="34" y2="18"/>
        <line x1="5.7" y1="7.7" x2="8.5" y2="10.5"/>
        <line x1="27.5" y1="25.5" x2="30.3" y2="28.3"/>
        <line x1="30.3" y1="7.7" x2="27.5" y2="10.5"/>
        <line x1="8.5" y1="25.5" x2="5.7" y2="28.3"/>
      </g>
      <text x="18" y="22" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="8" fill="#f5edd8">ITP</text>
    </svg>
    <div>
      <div class="logo-title">ITPoker</div>
      <div class="logo-sub">Калькулятор фишек</div>
    </div>
  </header>

  <main>
    <!-- SETTINGS -->
    <div class="section">
      <div class="section-title">Параметры игры</div>
      <div class="settings-grid">
        <div class="field-group">
          <span class="field-label">Цена одной фишки (₽)</span>
          <div class="num-wrap">
            <button class="num-btn" onclick="stepNum('chipPrice',-0.01)">−</button>
            <input type="number" id="chipPrice" value="10" min="0.01" step="0.01" placeholder="10">
            <button class="num-btn" onclick="stepNum('chipPrice',0.01)">+</button>
          </div>
        </div>
        <div class="field-group">
          <span class="field-label">Стартовые фишки у каждого</span>
          <div class="num-wrap">
            <button class="num-btn" onclick="stepNum('startChips',-1)">−</button>
            <input type="number" id="startChips" value="100" min="0" step="1" placeholder="100">
            <button class="num-btn" onclick="stepNum('startChips',1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PLAYERS -->
    <div class="section">
      <div class="section-title">Участники</div>
      <div id="playersList"></div>
      <button class="btn btn-outline" onclick="addPlayer()" style="margin-top:6px">
        + Добавить игрока
      </button>
    </div>

    <!-- CALCULATE -->
    <button class="btn btn-gold btn-big" onclick="calculate()" style="margin-bottom:16px">
      🃏 Рассчитать долги
    </button>

    <!-- RESULTS -->
    <div id="results">
      <div class="section">
        <div class="section-title">Итог игры</div>
        <div class="summary-grid" id="summaryGrid"></div>
        <div id="balanceList"></div>
      </div>

      <div class="section">
        <div class="section-title">Кто кому должен</div>
        <div id="debtList"></div>
      </div>

      <div class="section">
        <div class="section-title">Текст для Telegram</div>
        <div class="output-text" id="telegramText"></div>
        <div class="action-row">
          <button class="btn btn-outline" onclick="copyTelegram()">📋 Скопировать</button>
          <button class="btn btn-outline" onclick="downloadTxt()">⬇ Скачать .txt</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let players = [];
let pid = 0;

function addPlayer(first='', last='') {
  const id = ++pid;
  players.push({ id, first, last, rebuys: [] });
  renderPlayers();
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  renderPlayers();
}

function getAvatar(p) {
  const f = (p.first||'?')[0].toUpperCase();
  const l = (p.last||'')[0] ? p.last[0].toUpperCase() : '';
  return f + l;
}

function addRebuy(id) {
  const inp = document.getElementById('rebuy_' + id);
  const val = parseFloat(inp.value);
  if (!val || val <= 0) { inp.value = ''; return; }
  const p = players.find(p => p.id === id);
  if (!p) return;
  p.rebuys.push(val);
  inp.value = '';
  // Обновляем только бейджи и текст ребаев, не перерисовывая всю карточку
  const startChips = parseFloat(document.getElementById('startChips').value) || 100;
  const totalRebuys = p.rebuys.reduce((a,b)=>a+b,0);
  const totalChips = startChips + totalRebuys;
  const badgesEl = document.querySelector(`#pc_${id} .rebuy-badges`);
  if (badgesEl) {
    badgesEl.innerHTML = `
      <span class="chip-badge">🔵 Старт: ${startChips}</span>
      ${p.rebuys.length ? `<span class="chip-badge">🔴 Ребаи: +${totalRebuys}</span>` : ''}
      <span class="chip-badge" style="background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold)">Вложено: ${totalChips}</span>
    `;
  }
  const rebuyListEl = document.querySelector(`#pc_${id} .rebuy-list`);
  if (rebuyListEl) {
    rebuyListEl.textContent = p.rebuys.length ? `Ребаи: ${p.rebuys.join(', ')} = +${totalRebuys}` : '';
  }
}

function renderPlayers() {
  const startChips = parseFloat(document.getElementById('startChips').value) || 100;
  const el = document.getElementById('playersList');
  el.innerHTML = players.map(p => {
    const totalRebuys = p.rebuys.reduce((a,b)=>a+b,0);
    const totalChips = startChips + totalRebuys;
    const rebuyText = p.rebuys.length ? `Ребаи: ${p.rebuys.join(', ')} = +${totalRebuys}` : '';
    const finalVal = p.finalChips !== undefined ? p.finalChips : '';
    return `<div class="player-card" id="pc_${p.id}">
      <div class="player-header">
        <div class="player-avatar">${getAvatar(p)}</div>
        <div class="player-name-inputs">
          <input type="text" placeholder="Имя" value="${p.first}" oninput="updateName(${p.id},'first',this.value)" style="flex:1">
          <input type="text" placeholder="Фамилия" value="${p.last}" oninput="updateName(${p.id},'last',this.value)" style="flex:1">
        </div>
        <button class="btn btn-danger" onclick="removePlayer(${p.id})">✕</button>
      </div>
      <div class="rebuy-badges" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <span class="chip-badge">🔵 Старт: ${startChips}</span>
        ${p.rebuys.length ? `<span class="chip-badge">🔴 Ребаи: +${totalRebuys}</span>` : ''}
        <span class="chip-badge" style="background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold)">Вложено: ${totalChips}</span>
      </div>
      ${rebuyText ? `<div class="rebuy-list" style="margin-bottom:8px">${rebuyText}</div>` : ''}
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div class="field-group" style="flex:1">
          <span class="field-label">Ребай (фишки)</span>
          <input type="number" id="rebuy_${p.id}" placeholder="Введите и нажмите Enter" min="1" step="1"
            onkeydown="if(event.key==='Enter')addRebuy(${p.id})"
            onblur="addRebuy(${p.id})">
        </div>
        <div class="field-group" style="flex:1">
          <span class="field-label">Осталось фишек</span>
          <input type="number" id="final_${p.id}" value="${finalVal}" min="0" step="1" placeholder="Финальный стек" oninput="updateFinal(${p.id},this.value)">
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateName(id, field, val) {
  const p = players.find(p => p.id === id);
  if (p) {
    p[field] = val;
    const av = document.querySelector(`#pc_${id} .player-avatar`);
    if (av) av.textContent = getAvatar(p);
  }
}

function updateFinal(id, val) {
  const p = players.find(p => p.id === id);
  if (p) p.finalChips = val === '' ? undefined : parseFloat(val);
}

function calculate() {
  if (players.length < 2) { showToast('Добавьте минимум 2 игроков'); return; }
  const chipPrice = parseFloat(document.getElementById('chipPrice').value);
  const startChips = parseFloat(document.getElementById('startChips').value);
  if (!chipPrice || chipPrice <= 0) { showToast('Укажите цену фишки'); return; }

  for (const p of players) {
    if (!p.first.trim() && !p.last.trim()) { showToast('Укажите имя каждого игрока'); return; }
  }

  finalize(chipPrice, startChips);
}

function finalize(chipPrice, startChips) {
  // Синхронизируем finalChips из DOM перед расчётом
  for (const p of players) {
    const inp = document.getElementById('final_' + p.id);
    if (inp) {
      const v = parseFloat(inp.value);
      p.finalChips = isNaN(v) ? undefined : v;
    }
  }

  let totalFinal = 0;
  for (const p of players) {
    if (p.finalChips === undefined || p.finalChips < 0) {
      showToast(`Укажите остаток фишек для ${p.first || 'игрока'}`);
      return;
    }
    totalFinal += p.finalChips;
  }

  // Считаем балансы
  const totalIn = players.reduce((s,p) => s + startChips + p.rebuys.reduce((a,b)=>a+b,0), 0);

  const balances = players.map(p => {
    const invested = startChips + p.rebuys.reduce((a,b)=>a+b,0);
    const diff = (p.finalChips - invested) * chipPrice;
    return { p, invested, final: p.finalChips, diff };
  });

  // Минимальный алгоритм расчёта долгов
  const debts = settleDebts(balances.map(b => ({ name: fullName(b.p), amount: b.diff })));

  renderResults(balances, debts, chipPrice, totalIn, totalFinal);

  document.querySelector('.btn-gold.btn-big').textContent = '🔄 Пересчитать';
  document.querySelector('.btn-gold.btn-big').onclick = resetCalc;
}

function fullName(p) { return (p.first + ' ' + p.last).trim() || 'Игрок'; }

function settleDebts(players) {
  // players: [{name, amount}] where amount > 0 = выиграл, < 0 = проиграл
  const creditors = players.filter(p => p.amount > 0.005).map(p => ({...p}));
  const debtors   = players.filter(p => p.amount < -0.005).map(p => ({...p}));
  const results = [];

  let i = 0, j = 0;
  while (i < creditors.length && j < debtors.length) {
    const give = Math.min(creditors[i].amount, -debtors[j].amount);
    if (give > 0.005) {
      results.push({ from: debtors[j].name, to: creditors[i].name, amount: Math.round(give) });
    }
    creditors[i].amount -= give;
    debtors[j].amount += give;
    if (Math.abs(creditors[i].amount) < 0.005) i++;
    if (Math.abs(debtors[j].amount) < 0.005) j++;
  }
  return results;
}

function renderResults(balances, debts, chipPrice, totalIn, totalFinal) {
  const res = document.getElementById('results');
  res.classList.add('show');
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelector('.btn-gold.btn-big').textContent = '🔄 Пересчитать';

  // Summary
  const totalMoneyIn = balances.reduce((s,b) => s + b.invested * chipPrice, 0);
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card"><div class="val">${players.length}</div><div class="lbl">Игроков</div></div>
    <div class="summary-card"><div class="val">${totalIn}</div><div class="lbl">Фишек в игре</div></div>
    <div class="summary-card"><div class="val">${totalMoneyIn.toLocaleString('ru')} ₽</div><div class="lbl">Банк</div></div>
    <div class="summary-card"><div class="val">${debts.length}</div><div class="lbl">Переводов</div></div>
  `;

  // Balance list
  const sorted = [...balances].sort((a,b) => b.diff - a.diff);
  document.getElementById('balanceList').innerHTML = sorted.map(b => {
    const cls = b.diff > 0 ? 'bal-positive' : b.diff < 0 ? 'bal-negative' : 'bal-zero';
    const sign = b.diff > 0 ? '+' : '';
    return `<div class="player-balance-row">
      <span>${fullName(b.p)}</span>
      <span class="${cls}">${sign}${Math.round(b.diff).toLocaleString('ru')} ₽</span>
    </div>`;
  }).join('');

  // Debts
  if (debts.length === 0) {
    document.getElementById('debtList').innerHTML = '<div class="no-debts">🎉 Все в расчёте!</div>';
  } else {
    document.getElementById('debtList').innerHTML = debts.map(d => `
      <div class="result-debt">
        <span style="font-weight:500">${d.from}</span>
        <span class="arrow-icon">→</span>
        <span style="font-weight:500">${d.to}</span>
        <span class="amount-badge">${d.amount.toLocaleString('ru')} ₽</span>
      </div>`).join('');
  }

  // Telegram text
  const now = new Date().toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  let tg = `🃏 *ITPoker — Итоги игры*\n`;
  tg += `📅 ${now}\n`;
  tg += `💰 Банк: ${totalMoneyIn.toLocaleString('ru')} ₽ | Фишка: ${chipPrice} ₽\n\n`;
  tg += `📊 *Баланс игроков:*\n`;
  sorted.forEach(b => {
    const sign = b.diff >= 0 ? '+' : '';
    tg += `${b.diff >= 0 ? '🟢' : '🔴'} ${fullName(b.p)}: ${sign}${Math.round(b.diff).toLocaleString('ru')} ₽\n`;
  });
  if (debts.length > 0) {
    tg += `\n💸 *Переводы:*\n`;
    debts.forEach(d => { tg += `• ${d.from} → ${d.to}: ${d.amount.toLocaleString('ru')} ₽\n`; });
  } else {
    tg += '\n✅ Все в расчёте!\n';
  }
  tg += '\n— Сгенерировано ITPoker';
  document.getElementById('telegramText').textContent = tg;
  window._tgText = tg;
  window._balances = balances;
  window._debts = debts;
  window._chipPrice = chipPrice;
  window._totalMoneyIn = totalMoneyIn;
}

function resetCalc() {
  document.getElementById('results').classList.remove('show');
  document.querySelector('.btn-gold.btn-big').textContent = '🃏 Рассчитать долги';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyTelegram() {
  navigator.clipboard.writeText(window._tgText || '').then(() => showToast('Скопировано!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = window._tgText || '';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('Скопировано!');
  });
}

function downloadTxt() {
  const blob = new Blob([window._tgText || ''], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const now = new Date();
  a.download = `itpoker_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.txt`;
  a.click();
  showToast('Файл скачан');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// INIT
window.addEventListener('DOMContentLoaded', () => {
  addPlayer('Денис', 'И.');
  addPlayer('', '');

  setTimeout(() => {
    document.getElementById('app').classList.add('visible');
  }, 2000);
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
  }, 2800);
});

document.getElementById('startChips').addEventListener('input', renderPlayers);

function stepNum(id, delta) {
  const inp = document.getElementById(id);
  const val = parseFloat(inp.value) || 0;
  const step = Math.abs(delta);
  const decimals = step < 1 ? 2 : 0;
  const newVal = Math.max(parseFloat(inp.min) || 0, val + delta);
  inp.value = newVal.toFixed(decimals);
  inp.dispatchEvent(new Event('input'));
}
</script>
